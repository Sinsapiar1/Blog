<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Demos en video de aplicaciones AppSheet por Raul Pivet — Sistemas de inventario, gestión de almacén y más, desarrollados con AppSheet y Google Sheets.">
  <meta name="keywords" content="AppSheet, demos, aplicaciones móviles, inventario, gestión almacén, Google Sheets, Raul Pivet, automatización">
  <meta name="author" content="Raul Pivet">
  <meta name="theme-color" content="#FF6B00">
  <meta property="og:title" content="AppSheet Demos — Raul Pivet">
  <meta property="og:description" content="Videos demostrativos de aplicaciones AppSheet en producción: inventario, almacén y más.">
  <meta property="og:url" content="https://www.raulpivet.com/appsheet-demos.html">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://www.raulpivet.com/appsheet-demos.html">
  <title>AppSheet Demos - Raul Pivet</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="alternate icon" type="image/png" href="favicon-32x32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Language toggle ── */
    .language-toggle { position:fixed; top:80px; right:24px; z-index:999; display:flex; align-items:center; gap:8px; background:var(--glass-bg); backdrop-filter:blur(20px) saturate(180%); border:1px solid var(--glass-border); padding:8px 16px; border-radius:var(--radius-full); box-shadow:var(--shadow-sm); cursor:pointer; transition:all var(--transition-base); }
    .language-toggle:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
    .language-flag { font-size:1.25rem; }
    .language-text { font-size:0.875rem; font-weight:500; color:var(--text-primary); }
    @media(max-width:768px){ .language-toggle { top:70px; right:16px; padding:6px 12px; } .language-text { display:none; } }

    /* ── Shared section header ── */
    .section-eyebrow { font-size:11px; font-weight:800; color:#FF6B00; text-transform:uppercase; letter-spacing:0.12em; margin-bottom:8px; }
    .section-title { font-size:1.6rem; font-weight:700; color:var(--text-primary); letter-spacing:-0.02em; }

    /* ── Btn secondary outline — explicit colors, no variables ── */
    .demos-btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border: 2px solid rgba(255,107,0,0.45);
      border-radius: 50px;
      color: #FF6B00 !important;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none !important;
      transition: all 0.2s;
      background: transparent;
      cursor: pointer;
    }
    .demos-btn-outline:hover {
      border-color: #FF6B00;
      background: rgba(255,107,0,0.06);
      transform: translateY(-2px);
    }

    /* ══════════════════════════════════════════
       "¿QUÉ ES APPSHEET?" BUTTON
    ══════════════════════════════════════════ */
    .what-is-appsheet-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(255,107,0,0.08);
      border: 1.5px solid rgba(255,107,0,0.3);
      border-radius: 50px;
      color: #FF6B00;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s;
      margin-bottom: 24px;
    }
    .what-is-appsheet-btn:hover {
      background: rgba(255,107,0,0.15);
      border-color: #FF6B00;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255,107,0,0.2);
    }
    .what-is-appsheet-btn i {
      font-size: 1rem;
    }

    /* ══════════════════════════════════════════
       "¿QUÉ ES APPSHEET?" MODAL
    ══════════════════════════════════════════ */
    #appsheetInfoModal { 
      display:none; 
      position:fixed; 
      inset:0; 
      z-index:5001; 
      align-items:center; 
      justify-content:center; 
    }
    #appsheetInfoModal.modal-open { display:flex; }
    
    .modal-overlay { 
      position:absolute; 
      inset:0; 
      background:rgba(0,0,0,0); 
      backdrop-filter:blur(0px); 
      transition:background 0.4s ease, backdrop-filter 0.4s ease; 
      cursor:pointer; 
    }
    #appsheetInfoModal.modal-open .modal-overlay { 
      background:rgba(0,0,0,0.92); 
      backdrop-filter:blur(14px); 
    }
    
    .modal-content-wrapper { 
      position:relative; 
      z-index:1; 
      width:min(90vw, 800px); 
      max-height:85vh; 
      opacity:0; 
      transform:scale(0.93); 
      transition:opacity 0.35s cubic-bezier(0.16,1,0.3,1), transform 0.35s cubic-bezier(0.16,1,0.3,1); 
    }
    #appsheetInfoModal.modal-open .modal-content-wrapper { 
      opacity:1; 
      transform:scale(1); 
    }
    
    .modal-frame { 
      position:relative; 
      border-radius:var(--radius-xl); 
      overflow:hidden; 
      box-shadow:0 32px 80px rgba(0,0,0,0.7); 
      background:#0a0a0a; 
    }
    
    .modal-browser-bar { 
      background:#1e1e1e; 
      padding:12px 18px; 
      display:flex; 
      align-items:center; 
      gap:14px; 
      border-bottom:1px solid rgba(255,255,255,0.06); 
    }
    .modal-browser-dots { display:flex; gap:7px; }
    .modal-browser-dots span { width:12px; height:12px; border-radius:50%; }
    .modal-browser-dots span:nth-child(1){background:#FF5F56}
    .modal-browser-dots span:nth-child(2){background:#FFBD2E}
    .modal-browser-dots span:nth-child(3){background:#27C93F}
    .modal-url-bar { 
      flex:1; 
      background:rgba(255,255,255,0.08); 
      border-radius:6px; 
      padding:6px 14px; 
      font-size:0.8rem; 
      color:rgba(255,255,255,0.6); 
      font-family:monospace; 
    }
    
    .modal-body { 
      background:var(--bg-primary); 
      padding:40px; 
      max-height:70vh; 
      overflow-y:auto; 
    }
    
    .modal-close-btn { 
      position:absolute; 
      top:56px; 
      right:16px; 
      width:40px; 
      height:40px; 
      background:rgba(0,0,0,0.6); 
      border:none; 
      border-radius:50%; 
      color:white; 
      font-size:1.05rem; 
      cursor:pointer; 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      backdrop-filter:blur(8px); 
      transition:background 0.2s, transform 0.2s; 
      z-index:20; 
    }
    .modal-close-btn:hover { 
      background:rgba(255,59,48,0.9); 
      transform:scale(1.12); 
    }
    
    .modal-header { 
      text-align:center; 
      margin-bottom:32px; 
    }
    .modal-google-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #4285F4, #34A853);
      color: white;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
    }
    .modal-header h2 { 
      font-size:clamp(1.6rem, 3vw, 2.2rem); 
      font-weight:800; 
      color:var(--text-primary); 
      margin-bottom:12px; 
      letter-spacing:-0.02em; 
    }
    .modal-header h2 span { 
      background:linear-gradient(135deg,#FF6B00,#FF9500); 
      -webkit-background-clip:text; 
      -webkit-text-fill-color:transparent; 
    }
    .modal-header p { 
      font-size:1.05rem; 
      color:var(--text-secondary); 
      line-height:1.6; 
      max-width:600px; 
      margin:0 auto; 
    }
    
    .modal-section { 
      margin-bottom:32px; 
    }
    .modal-section-title { 
      font-size:1.1rem; 
      font-weight:700; 
      color:var(--text-primary); 
      margin-bottom:16px; 
      display:flex; 
      align-items:center; 
      gap:10px; 
    }
    .modal-section-title i { 
      color:#FF6B00; 
      font-size:1.2rem; 
    }
    
    .modal-grid { 
      display:grid; 
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); 
      gap:16px; 
      margin-bottom:24px; 
    }
    .modal-feature-card { 
      background:var(--bg-secondary); 
      border:1px solid var(--border-color); 
      border-radius:14px; 
      padding:20px; 
      transition:all 0.2s; 
    }
    .modal-feature-card:hover { 
      border-color:rgba(255,107,0,0.3); 
      transform:translateY(-2px); 
    }
    .modal-feature-icon { 
      width:40px; 
      height:40px; 
      background:linear-gradient(135deg, rgba(255,107,0,0.15), rgba(255,149,0,0.08)); 
      border-radius:10px; 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      color:#FF6B00; 
      font-size:1.1rem; 
      margin-bottom:12px; 
    }
    .modal-feature-card h4 { 
      font-size:0.95rem; 
      font-weight:700; 
      color:var(--text-primary); 
      margin-bottom:6px; 
    }
    .modal-feature-card p { 
      font-size:0.85rem; 
      color:var(--text-secondary); 
      line-height:1.5; 
    }
    
    .modal-integrations { 
      display:flex; 
      flex-wrap:wrap; 
      gap:10px; 
      margin-bottom:24px; 
    }
    .modal-integration-badge { 
      background:var(--bg-secondary); 
      border:1px solid var(--border-color); 
      color:var(--text-secondary); 
      font-size:0.85rem; 
      font-weight:600; 
      padding:8px 14px; 
      border-radius:20px; 
      display:inline-flex; 
      align-items:center; 
      gap:6px; 
    }
    .modal-integration-badge i { 
      color:#FF6B00; 
    }
    
    .modal-cta-box { 
      background:linear-gradient(135deg, rgba(255,107,0,0.1), rgba(255,149,0,0.05)); 
      border:1px solid rgba(255,107,0,0.25); 
      border-radius:16px; 
      padding:28px; 
      text-align:center; 
    }
    .modal-cta-box h3 { 
      font-size:1.25rem; 
      font-weight:800; 
      color:var(--text-primary); 
      margin-bottom:10px; 
    }
    .modal-cta-box p { 
      color:var(--text-secondary); 
      margin-bottom:20px; 
      font-size:0.95rem; 
    }
    
    @media(max-width:768px){ 
      .modal-body { padding:28px 24px; } 
      .modal-grid { grid-template-columns:1fr; } 
    }

    /* ══════════════════════════════════════════
       HERO
    ══════════════════════════════════════════ */
    .demos-hero { padding: 48px 0 40px; }

    .demos-hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .demos-eyebrow-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: linear-gradient(135deg, #FF6B00, #FF9500);
      color: white; font-size: 10px; font-weight: 900;
      text-transform: uppercase; letter-spacing: 0.15em;
      padding: 7px 14px; border-radius: 30px; white-space: nowrap;
      box-shadow: 0 4px 16px rgba(255,107,0,0.45);
      animation: pill-glow 2.5s ease-in-out infinite;
    }
    @keyframes pill-glow {
      0%,100% { box-shadow: 0 4px 16px rgba(255,107,0,0.45); }
      50%      { box-shadow: 0 4px 28px rgba(255,107,0,0.75), 0 0 0 4px rgba(255,107,0,0.12); }
    }
    .demos-eyebrow-pill i { font-size: 0.75rem; }
    .demos-eyebrow-sub {
      font-size: 0.875rem; font-weight: 600; color: var(--text-secondary);
    }

    .demos-hero h1 { font-size:clamp(1.9rem,4vw,2.8rem); font-weight:800; line-height:1.15; letter-spacing:-0.03em; color:var(--text-primary); margin-bottom:16px; }
    .demos-hero h1 span { background:linear-gradient(135deg,#FF6B00,#FF9500); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .demos-hero-sub { font-size:1.05rem; color:var(--text-secondary); line-height:1.7; max-width:560px; margin-bottom:28px; }
    .demos-hero-tags { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:32px; }
    .demos-hero-tag { background:var(--bg-secondary); border:1px solid var(--border-color); color:var(--text-secondary); font-size:12px; font-weight:600; padding:5px 12px; border-radius:20px; transition:all 0.2s; }
    .demos-hero-tag:hover { border-color:#FF6B00; color:#FF6B00; }

    /* ══════════════════════════════════════════
       STATS BAR — mismo estilo que index.html
    ══════════════════════════════════════════ */
    .demos-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 0 0 48px;
    }
    @media(max-width:640px){ .demos-stats { grid-template-columns: 1fr; } }
    @media(max-width:900px) and (min-width:641px){ .demos-stats { grid-template-columns: repeat(3,1fr); } }

    .demos-stat {
      background: var(--glass-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 24px 20px 20px;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
      transition: all 0.3s cubic-bezier(0.34,1.3,0.64,1);
    }
    .demos-stat::before {
      content: attr(data-ghost);
      position: absolute; right: -8px; bottom: -14px;
      font-size: 4.5rem; font-weight: 900;
      color: rgba(255,107,0,0.05); line-height: 1;
      pointer-events: none; transition: color 0.3s;
    }
    .demos-stat:hover { border-color:rgba(255,107,0,0.4); transform:translateY(-6px); box-shadow:0 16px 40px rgba(255,107,0,0.15); }
    .demos-stat:hover::before { color:rgba(255,107,0,0.09); }
    .demos-stat-bar { position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#FF6B00,#FF9500); transform:scaleX(0); transform-origin:left; transition:transform 0.4s ease; border-radius:20px 20px 0 0; }
    .demos-stat:hover .demos-stat-bar { transform:scaleX(1); }
    .demos-stat-icon-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .demos-stat-icon { width:40px; height:40px; background:linear-gradient(135deg,rgba(255,107,0,0.18),rgba(255,149,0,0.08)); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1rem; color:#FF6B00; border:1px solid rgba(255,107,0,0.15); }
    .demos-stat-trend { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:0.1em; color:#34C759; background:rgba(52,199,89,0.1); border:1px solid rgba(52,199,89,0.2); padding:3px 8px; border-radius:10px; }
    .demos-stat-number { font-size:2.2rem; font-weight:900; color:#FF6B00; line-height:1; letter-spacing:-0.03em; margin-bottom:6px; }
    .demos-stat-label { font-size:0.8125rem; font-weight:700; color:var(--text-primary); line-height:1.3; margin-bottom:4px; }
    .demos-stat-sub { font-size:11px; color:var(--text-tertiary); line-height:1.4; font-style:italic; }

    /* ══════════════════════════════════════════
       INTRO CARD — "Aplicaciones reales"
    ══════════════════════════════════════════ */
    .demos-intro-card {
      background: var(--glass-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      margin-bottom: 48px;
    }
    .demos-intro-card::before {
      content: '';
      position: absolute; top:0; left:0; right:0; height:3px;
      background: linear-gradient(90deg, #FF6B00, #FF9500, #FFB800);
    }
    .demos-intro-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    @media(max-width:800px){ .demos-intro-inner { grid-template-columns:1fr; } }
    .demos-intro-left {
      padding: 36px 40px;
      border-right: 1px solid var(--border-color);
      display: flex; flex-direction: column; justify-content: center;
    }
    @media(max-width:800px){ .demos-intro-left { border-right:none; border-bottom:1px solid var(--border-color); } }
    .demos-intro-eyebrow { display:inline-flex; align-items:center; gap:8px; background:rgba(255,107,0,0.1); border:1px solid rgba(255,107,0,0.25); color:#FF6B00; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.12em; padding:5px 12px; border-radius:20px; margin-bottom:18px; width:fit-content; }
    .demos-intro-left h2 { font-size:clamp(1.2rem,2vw,1.55rem); font-weight:800; color:var(--text-primary); line-height:1.25; letter-spacing:-0.02em; margin-bottom:14px; }
    .demos-intro-left h2 span { background:linear-gradient(135deg,#FF6B00,#FF9500); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .demos-intro-left p { font-size:0.9375rem; color:var(--text-secondary); line-height:1.75; margin-bottom:20px; }
    .demos-proof { display:inline-flex; align-items:center; gap:8px; background:rgba(52,199,89,0.08); border:1px solid rgba(52,199,89,0.2); border-radius:10px; padding:10px 14px; font-size:0.8125rem; color:var(--text-secondary); line-height:1.5; }
    .demos-proof i { color:#34C759; font-size:1rem; flex-shrink:0; }
    .demos-proof strong { color:var(--text-primary); }

    .demos-intro-right {
      padding: 36px 40px;
      display: flex; flex-direction: column; gap: 14px; justify-content: center;
    }
    .demos-feature {
      display: flex; align-items: flex-start; gap: 14px;
      background: var(--bg-secondary); border:1px solid var(--border-color);
      border-radius: 14px; padding: 16px 18px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .demos-feature:hover { border-color:rgba(255,107,0,0.3); transform:translateX(4px); }
    .demos-feature-icon { width:32px; height:32px; flex-shrink:0; background:linear-gradient(135deg,#FF6B00,#FF9500); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.8rem; color:white; }
    .demos-feature-title { font-size:0.875rem; font-weight:700; color:var(--text-primary); margin-bottom:3px; }
    .demos-feature-desc { font-size:0.8rem; color:var(--text-secondary); line-height:1.55; }

    /* ══════════════════════════════════════════
       VIDEO SECTION HEADER
    ══════════════════════════════════════════ */
    .demos-section-header { margin-bottom:28px; }

    /* ══════════════════════════════════════════
       VIDEO GRID
    ══════════════════════════════════════════ */
    .demos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 28px;
      margin-bottom: 56px;
    }
    @media(max-width:480px){ .demos-grid { grid-template-columns:1fr; } }

    /* ── Video card ── */
    .demo-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: all var(--transition-base);
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column;
      position: relative;
      cursor: pointer;
    }
    .demo-card::before {
      content: '';
      position: absolute; top:0; left:0; right:0; height:3px;
      background: linear-gradient(90deg,#FF6B00,#FF9500);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.4s ease;
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      z-index: 1;
    }
    .demo-card:hover::before { transform: scaleX(1); }
    .demo-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 56px rgba(255,107,0,0.16);
      border-color: rgba(255,107,0,0.3);
    }

    /* YouTube embed 16:9 */
    .demo-video-wrap {
      position: relative; width: 100%; padding-top: 56.25%;
      background: #000; overflow: hidden;
    }
    .demo-video-wrap iframe {
      position: absolute; top:0; left:0;
      width:100%; height:100%; border:none;
      pointer-events: none;
    }

    /* Overlay "Ver Detalles" */
    .demo-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all var(--transition-base);
      z-index: 2;
    }
    .demo-card:hover .demo-overlay {
      background: rgba(0,0,0,0.7);
      opacity: 1;
    }
    .demo-overlay-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg,#FF6B00,#FF9500);
      color: white;
      border: none;
      border-radius: var(--radius-full);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255,107,0,0.4);
      transition: all var(--transition-fast);
      backdrop-filter: blur(8px);
    }
    .demo-overlay-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 32px rgba(255,107,0,0.6);
    }

    /* Card body */
    .demo-card-body { padding: 22px 24px 24px; flex:1; display:flex; flex-direction:column; }
    .demo-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
    .demo-tag { font-size:0.7rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:3px 10px; border-radius:var(--radius-full); background:rgba(255,107,0,0.08); color:#FF6B00; border:1px solid rgba(255,107,0,0.2); }

  function bindDemoCards() {
    document.querySelectorAll('.demo-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('.demo-yt-link')) return;
        const idx = parseInt(card.dataset.demoIdx);
        openDemoLightbox(idx);
      });
    });
  }

  /* ══════════════════════════════════════════════════════

  ══════════════════════════════════════════════════════ */

    const btn = document.getElementById('whatIsBtn');

      btn.addEventListener('click', openAppSheetModal);
    }
  }

    const d = demosTrans[lang];

        </h3>

          ${d.modal_usecases.map(u => `

  function openAppSheetModal() {
    const modal = document.getElementById('appsheetInfoModal');
    modal.style.display = 'flex';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => modal.classList.add('modal-open'));
    });
    document.body.style.overflow = 'hidden';
  }

  function closeAppSheetModal() {
    const modal = document.getElementById('appsheetInfoModal');
    modal.classList.remove('modal-open');
    document.body.style.overflow = '';
    setTimeout(() => { modal.style.display = 'none'; }, 400);
  }

  /* ══════════════════════════════════════════════════════
     LIGHTBOX DEMOS
  ══════════════════════════════════════════════════════ */
  const demoLb = document.getElementById('demoLightbox');
  const lbOverlay = document.getElementById('lbOverlay');
  const lbClose = document.getElementById('lbClose');
  const lbTitle = document.getElementById('lbTitle');
  const lbDesc = document.getElementById('lbDesc');
  const lbYtBtn = document.getElementById('lbYtBtn');
  const carouselInner = document.getElementById('carouselInner');
  const carouselPrev = document.getElementById('carouselPrev');
  const carouselNext = document.getElementById('carouselNext');
  const carouselIndicators = document.getElementById('carouselIndicators');

  function openDemoLightbox(idx) {
    const d = demosTrans[lang];
    const demo = d.videos[idx];
    if (!demo) return;

    currentDemoData = demo;
    currentCarouselIndex = 0;

    const slides = [{ type: 'video', id: demo.id }];
    if (demo.screenshots && demo.screenshots.length > 0) {
      demo.screenshots.forEach(url => {
        slides.push({ type: 'image', url });
      });
    }

    carouselInner.innerHTML = slides.map((slide, i) => {
      if (slide.type === 'video') {
        return `
          <div class="lb-carousel-slide">
            <iframe
              src="https://www.youtube.com/embed/${slide.id}?rel=0&modestbranding=1&autoplay=0"
              title="${demo.title}"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </div>`;
      } else {
        return `
          <div class="lb-carousel-slide">
            <img src="${slide.url}" alt="Screenshot ${i}" loading="lazy">
          </div>`;
      }
    }).join('');

    carouselIndicators.innerHTML = slides.map((_, i) => 
      `<button class="lb-carousel-dot ${i === 0 ? 'active' : ''}" data-slide="${i}"></button>`
    ).join('');

    document.querySelectorAll('.lb-carousel-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        goToSlide(parseInt(dot.dataset.slide));
      });
    });

    lbTitle.textContent = demo.title;
    lbDesc.textContent = demo.desc_long || demo.desc;
    lbYtBtn.href = `https://www.youtube.com/watch?v=${demo.id}`;

    demoLb.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => demoLb.classList.add('lb-open')));
    document.body.style.overflow = 'hidden';

    updateCarouselButtons();
  }

  function closeDemoLightbox() {
    demoLb.classList.remove('lb-open');
    document.body.style.overflow = '';
    setTimeout(() => { demoLb.style.display = 'none'; }, 380);
  }

  function goToSlide(index) {
    const slides = carouselInner.querySelectorAll('.lb-carousel-slide');
    if (index < 0 || index >= slides.length) return;
    
    currentCarouselIndex = index;
    carouselInner.style.transform = `translateX(-${index * 100}%)`;
    
    document.querySelectorAll('.lb-carousel-dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === index);
    });
    
    updateCarouselButtons();
  }

  function updateCarouselButtons() {
    const slides = carouselInner.querySelectorAll('.lb-carousel-slide');
    carouselPrev.disabled = currentCarouselIndex === 0;
    carouselNext.disabled = currentCarouselIndex === slides.length - 1;
  }

  // Event listeners
  lbClose.addEventListener('click', (e) => { e.stopPropagation(); closeDemoLightbox(); });
  lbOverlay.addEventListener('click', closeDemoLightbox);
  
  carouselPrev.addEventListener('click', () => {
    if (currentCarouselIndex > 0) goToSlide(currentCarouselIndex - 1);
  });
  
  carouselNext.addEventListener('click', () => {
    const slides = carouselInner.querySelectorAll('.lb-carousel-slide');
    if (currentCarouselIndex < slides.length - 1) goToSlide(currentCarouselIndex + 1);
  });

  document.addEventListener('keydown', e => {
    if (demoLb.classList.contains('lb-open')) {
      if (e.key === 'Escape') closeDemoLightbox();
      if (e.key === 'ArrowLeft' && currentCarouselIndex > 0) goToSlide(currentCarouselIndex - 1);
      if (e.key === 'ArrowRight') {
        const slides = carouselInner.querySelectorAll('.lb-carousel-slide');
        if (currentCarouselIndex < slides.length - 1) goToSlide(currentCarouselIndex + 1);
      }
    }
    if (document.getElementById('appsheetInfoModal').classList.contains('modal-open')) {
      if (e.key === 'Escape') closeAppSheetModal();
    }
  });

  let touchStartX = 0;
  carouselInner.addEventListener('touchstart', e => { 
    touchStartX = e.changedTouches[0].clientX; 
  }, { passive: true });
  
  carouselInner.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) < 50) return;
    
    const slides = carouselInner.querySelectorAll('.lb-carousel-slide');
    if (diff > 0 && currentCarouselIndex < slides.length - 1) {
      goToSlide(currentCarouselIndex + 1);
    } else if (diff < 0 && currentCarouselIndex > 0) {
      goToSlide(currentCarouselIndex - 1);
    }
  });

  // Modal close
  document.getElementById('modalCloseBtn').addEventListener('click', closeAppSheetModal);
  document.getElementById('modalOverlay').addEventListener('click', closeAppSheetModal);

  function toggleLang() {
    lang = lang === 'es' ? 'en' : 'es';
    localStorage.setItem('homeLang', lang);
    renderDemos();
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderDemos();
    document.getElementById('languageToggle').addEventListener('click', toggleLang);
  });
  </script>
