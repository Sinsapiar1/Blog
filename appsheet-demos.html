<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Demos en video de aplicaciones AppSheet por Raul Pivet — Sistemas de inventario, gestión de almacén y más, desarrollados con AppSheet y Google Sheets.">
  <meta name="keywords" content="AppSheet, demos, aplicaciones móviles, inventario, gestión almacén, Google Sheets, Raul Pivet, automatización">
  <meta name="author" content="Raul Pivet">
  <meta name="theme-color" content="#FF6B00">
  <meta property="og:title" content="AppSheet Demos — Raul Pivet">
  <meta property="og:description" content="Videos demostrativos de aplicaciones AppSheet en producción: inventario, almacén y más.">

  <meta property="og:type" content="website">

  <title>AppSheet Demos - Raul Pivet</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="alternate icon" type="image/png" href="favicon-32x32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Language toggle — mismo estilo que el resto del sitio ── */
    .language-toggle { position:fixed; top:80px; right:24px; z-index:999; display:flex; align-items:center; gap:8px; background:var(--glass-bg); backdrop-filter:blur(20px) saturate(180%); border:1px solid var(--glass-border); padding:8px 16px; border-radius:var(--radius-full); box-shadow:var(--shadow-sm); cursor:pointer; transition:all var(--transition-base); }
    .language-toggle:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
    .language-flag { font-size:1.25rem; }
    .language-text { font-size:0.875rem; font-weight:500; color:var(--text-primary); }
    @media(max-width:768px){ .language-toggle { top:70px; right:16px; padding:6px 12px; } .language-text { display:none; } }

    /* ── Section headers ── */
    .section-eyebrow { font-size:11px; font-weight:800; color:#FF6B00; text-transform:uppercase; letter-spacing:0.12em; margin-bottom:8px; }
    .section-title { font-size:1.6rem; font-weight:700; color:var(--text-primary); letter-spacing:-0.02em; }

    /* ── Intro banner ── */
    .demos-intro {
      background: linear-gradient(135deg, rgba(255,107,0,0.08), rgba(255,149,0,0.04));
      border: 1px solid rgba(255,107,0,0.2);
      border-radius: 20px;
      padding: 36px 40px;
      margin-bottom: 48px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
    }
    @media(max-width:640px){ .demos-intro { grid-template-columns:1fr; padding:24px; } }
    .demos-intro-text h2 { font-size: clamp(1.25rem,2.5vw,1.6rem); font-weight:800; color:var(--text-primary); margin-bottom:10px; letter-spacing:-0.02em; }
    .demos-intro-text h2 span { background:linear-gradient(135deg,#FF6B00,#FF9500); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .demos-intro-text p { font-size:0.9375rem; color:var(--text-secondary); line-height:1.7; }
    .demos-intro-badge { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; background:linear-gradient(135deg,#FF6B00,#FF9500); color:white; border-radius:16px; padding:20px 28px; text-align:center; flex-shrink:0; box-shadow:0 8px 24px rgba(255,107,0,0.35); }
    .demos-intro-badge .badge-icon { font-size:2rem; }
    .demos-intro-badge .badge-num { font-size:2rem; font-weight:900; line-height:1; }
    .demos-intro-badge .badge-label { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; opacity:0.9; }

    /* ── Video grid ── */
    .demos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      margin-bottom: 56px;
    }
    @media(max-width:520px){ .demos-grid { grid-template-columns:1fr; } }

    /* ── Video card ── */
    .demo-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: all var(--transition-base);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
    }
    .demo-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 48px rgba(255,107,0,0.14);
      border-color: rgba(255,107,0,0.25);
    }

    /* ── YouTube embed wrapper (16:9) ── */
    .demo-video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      background: #000;
      overflow: hidden;
    }
    .demo-video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
    /* Overlay play-button visible antes de que el usuario interactúe */
    .demo-video-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
      background: rgba(0,0,0,0.28);
      transition: background var(--transition-base);
    }
    .demo-video-overlay:hover { background: rgba(0,0,0,0.12); }
    .demo-video-overlay.hidden { display: none; }
    .play-btn {
      width: 68px; height: 68px;
      background: linear-gradient(135deg, #FF6B00, #FF9500);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 28px rgba(255,107,0,0.55);
      transition: transform var(--transition-base), box-shadow var(--transition-base);
    }
    .demo-video-overlay:hover .play-btn { transform: scale(1.1); box-shadow: 0 12px 36px rgba(255,107,0,0.7); }
    .play-btn i { font-size: 1.6rem; color: white; margin-left: 4px; }

    /* ── Card body ── */
    .demo-card-body { padding: 22px 24px 24px; flex: 1; display: flex; flex-direction: column; }
    .demo-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
    .demo-tag { font-size:0.7rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:3px 10px; border-radius:var(--radius-full); background:rgba(255,107,0,0.08); color:#FF6B00; border:1px solid rgba(255,107,0,0.2); }
    .demo-card-body h3 { font-size:1.1rem; font-weight:700; color:var(--text-primary); margin-bottom:8px; letter-spacing:-0.01em; }
    .demo-card-body p { font-size:0.875rem; color:var(--text-secondary); line-height:1.65; flex:1; margin-bottom:16px; }
    .demo-card-footer { display:flex; align-items:center; justify-content:space-between; padding-top:14px; border-top:1px solid var(--border-color); margin-top:auto; }
    .demo-status { display:flex; align-items:center; gap:6px; font-size:0.78rem; color:var(--text-secondary); font-weight:500; }
    .demo-status-dot { width:8px; height:8px; border-radius:50%; background:var(--success); box-shadow:0 0 6px rgba(52,199,89,0.6); animation:pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:0.4} }
    .demo-yt-link { display:flex; align-items:center; gap:6px; font-size:0.82rem; font-weight:600; color:#FF6B00; text-decoration:none; transition:gap var(--transition-fast), color var(--transition-fast); }
    .demo-yt-link:hover { gap:9px; color:#E55A00; }

    /* ── CTA final ── */
    .demos-cta { margin:8px 0 48px; background:linear-gradient(135deg,rgba(255,107,0,0.08),rgba(255,149,0,0.04)); border:1px solid rgba(255,107,0,0.2); border-radius:20px; padding:40px; text-align:center; }
    .demos-cta h2 { font-size:1.5rem; font-weight:800; color:var(--text-primary); margin-bottom:10px; letter-spacing:-0.02em; }
    .demos-cta p { color:var(--text-secondary); margin-bottom:24px; font-size:1rem; line-height:1.6; }
    .demos-cta-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  </style>
</head>
<body>

  </div>
  <button class="menu-toggle" id="menuToggle" aria-label="Menú">

  <div class="container">

        <li class="menu-item"><a href="proyectos.html"><i class="fas fa-code"></i> <span data-i18n="nav_projects">Proyectos</span></a></li>

      </div>
    </aside>

    <main class="content" id="mainContent"></main>
  </div>

  <footer><p id="footerText">&copy; 2026 Raul Pivet. Todos los derechos reservados.</p></footer>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="script.js"></script>
  <script>
  /* ══════════════════════════════════════════════════════
     TRADUCCIONES — mismo patrón que el resto del sitio
  ══════════════════════════════════════════════════════ */
  const demosTrans = {
    es: {
      nav_home:'Inicio', nav_about:'Sobre Mí', nav_projects:'Proyectos',
      nav_contact:'Contacto', nav_demos:'AppSheet Demos',
      page_title: 'AppSheet Demos - Raul Pivet',
      footer: '© 2026 Raul Pivet. Todos los derechos reservados.',
      eyebrow: 'Demos en video',
      header_h1: 'AppSheet en Acción',
      header_sub: 'Aplicaciones móviles reales para gestión de inventario, almacén y operaciones logísticas.',
      intro_h2_a: 'Aplicaciones que',
      intro_h2_b: 'funcionan en producción',
      intro_p: 'Cada demo muestra una aplicación real construida con AppSheet y Google Sheets. No son prototipos ni mockups — son sistemas que equipos reales usan en su operación diaria.',
      badge_label: 'En producción',
      status_live: 'Activo',
      watch_yt: 'Ver en YouTube',
      cta_h2: '¿Necesitás una app así para tu operación?',
      cta_p: 'Puedo analizar tu flujo actual y construir una solución a medida con AppSheet. Rápido, sin código complejo y que tu equipo realmente use.',
      cta_btn1: 'Hablemos',
      cta_btn2: 'Ver todos los proyectos',
      videos: [
        {
          id: 'ghiOKoppKp4',
          title: 'Sistema de Control de Almacén',
          desc: 'App móvil completa para gestión de inventario: entradas, salidas, maestro de productos y exportación automática de documentos. Implementada en operación real con turno continuo.',
          tags: ['AppSheet', 'Google Sheets', 'Inventario', 'Drive']
        }
      ]
    },
    en: {
      nav_home:'Home', nav_about:'About Me', nav_projects:'Projects',
      nav_contact:'Contact', nav_demos:'AppSheet Demos',
      page_title: 'AppSheet Demos - Raul Pivet',
      footer: '© 2026 Raul Pivet. All rights reserved.',
      eyebrow: 'Video demos',
      header_h1: 'AppSheet in Action',
      header_sub: 'Real mobile applications for inventory management, warehouse and logistics operations.',
      intro_h2_a: 'Apps that actually',
      intro_h2_b: 'run in production',
      intro_p: 'Each demo shows a real application built with AppSheet and Google Sheets. These are not prototypes or mockups — they are live systems that real teams use in their day-to-day operations.',
      badge_label: 'In production',
      status_live: 'Live',
      watch_yt: 'Watch on YouTube',
      cta_h2: 'Need an app like this for your operation?',
      cta_p: 'I can analyze your current workflow and build a custom AppSheet solution. Fast, no complex code, and something your team will actually use.',
      cta_btn1: "Let's talk",
      cta_btn2: 'See all projects',
      videos: [
        {
          id: 'ghiOKoppKp4',
          title: 'Warehouse Management System',
          desc: 'Full mobile app for inventory management: entries, exits, product master and automatic document export. Deployed in a real continuous-shift operation.',
          tags: ['AppSheet', 'Google Sheets', 'Inventory', 'Drive']
        }
      ]
    }
  };

  let lang = localStorage.getItem('homeLang') || 'es';

  function buildVideoCard(v, d, idx) {
    return `
      <article class="demo-card" data-aos="fade-up" data-aos-delay="${100 + idx * 80}">
        <div class="demo-video-wrap">
          <iframe
            src="https://www.youtube.com/embed/${v.id}?rel=0&modestbranding=1"
            title="${v.title}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
            loading="lazy"
          ></iframe>
        </div>
        <div class="demo-card-body">
          <div class="demo-tags">${v.tags.map(t => `<span class="demo-tag">${t}</span>`).join('')}</div>
          <h3>${v.title}</h3>
          <p>${v.desc}</p>
          <div class="demo-card-footer">
            <span class="demo-status">
              <span class="demo-status-dot"></span>
              ${d.status_live}
            </span>
            <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener noreferrer" class="demo-yt-link">
              <i class="fab fa-youtube"></i> ${d.watch_yt} <i class="fas fa-arrow-right"></i>
            </a>
          </div>
        </div>
      </article>`;
  }

  function renderDemos() {
    const d = demosTrans[lang];

    document.title = d.page_title;
    document.getElementById('languageFlag').textContent = lang === 'es' ? '🇺🇸' : '🇪🇸';
    document.getElementById('languageText').textContent = lang === 'es' ? 'English' : 'Español';
    document.getElementById('footerText').textContent = d.footer;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      if (d[k]) el.textContent = d[k];
    });

    const videoCount = d.videos.length;

    document.getElementById('mainContent').innerHTML = `
      <header class="header" data-aos="fade-down">
        <p class="section-eyebrow">${d.eyebrow}</p>
        <h1>${d.header_h1}</h1>
        <p>${d.header_sub}</p>
      </header>

      <div class="demos-intro" data-aos="fade-up">
        <div class="demos-intro-text">
          <h2>${d.intro_h2_a} <span>${d.intro_h2_b}</span></h2>
          <p>${d.intro_p}</p>
        </div>
        <div class="demos-intro-badge">
          <span class="badge-icon"><i class="fas fa-mobile-alt"></i></span>
          <span class="badge-num">${videoCount}</span>
          <span class="badge-label">${d.badge_label}</span>
        </div>
      </div>

      <div class="demos-grid">
        ${d.videos.map((v, i) => buildVideoCard(v, d, i)).join('')}
      </div>

      <section class="demos-cta" data-aos="fade-up">
        <h2>${d.cta_h2}</h2>
        <p>${d.cta_p}</p>
        <div class="demos-cta-btns">
          <a href="contacto.html" class="btn"><i class="fas fa-paper-plane"></i> ${d.cta_btn1}</a>
          <a href="proyectos.html" class="btn-outline"><i class="fas fa-code"></i> ${d.cta_btn2}</a>
        </div>
      </section>`;

    refreshAOS();
  }

  function toggleLang() {
    lang = lang === 'es' ? 'en' : 'es';
    localStorage.setItem('homeLang', lang);
    renderDemos();
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderDemos();
    document.getElementById('languageToggle').addEventListener('click', toggleLang);
  });
  </script>
</body>
</html>
