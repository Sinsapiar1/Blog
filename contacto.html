    /* ── LANGUAGE TOGGLE ── */
    .language-toggle { position:fixed; top:80px; right:24px; z-index:999; display:flex; align-items:center; gap:8px; background:var(--glass-bg); backdrop-filter:blur(20px) saturate(180%); border:1px solid var(--glass-border); padding:8px 16px; border-radius:var(--radius-full); box-shadow:var(--shadow-sm); cursor:pointer; transition:all var(--transition-base); }
    .language-toggle:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
    .language-flag { font-size:1.25rem; }
    .language-text { font-size:0.875rem; font-weight:500; color:var(--text-primary); }
    @media(max-width:768px){ .language-toggle { top:70px; right:16px; padding:6px 12px; } .language-text { display:none; } }

    /* ── LAYOUT ── */
    .contact-wrap { display: grid; grid-template-columns: 1fr 1.65fr; gap: 28px; align-items: start; }
    @media(max-width:960px){ .contact-wrap { grid-template-columns:1fr; } }

    /* ── PANEL IZQUIERDO ── */
    .contact-panel { display: flex; flex-direction: column; gap: 16px; }

    /* ── CARD BASE ── */
    .c-card { background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); padding: 28px; }

    /* ── INTRO CARD ── */
    .intro-card .intro-eyebrow { font-size: 11px; font-weight: 800; color: #FF6B00; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
    .intro-card h2 { font-size: 1.35rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.02em; margin-bottom: 10px; line-height: 1.25; }
    .intro-card h2 span { background: linear-gradient(135deg,#FF6B00,#FF9500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .intro-card p { font-size: 0.875rem; color: var(--text-secondary); line-height: 1.7; margin-bottom: 20px; }

    /* ── DISPONIBLE BADGE ── */
    .avail-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(52,199,89,0.08); border: 1px solid rgba(52,199,89,0.25); border-radius: 20px; padding: 7px 14px; }
    .avail-dot { width: 8px; height: 8px; border-radius: 50%; background: #34C759; box-shadow: 0 0 0 3px rgba(52,199,89,0.2); animation: avail-pulse 2s infinite; flex-shrink: 0; }
    @keyframes avail-pulse { 0%,100%{ box-shadow:0 0 0 3px rgba(52,199,89,0.2); } 50%{ box-shadow:0 0 0 6px rgba(52,199,89,0.05); } }
    .avail-text { font-size: 0.8rem; font-weight: 700; color: #34C759; }

    /* ── INFO ITEMS ── */
    .info-list { display: flex; flex-direction: column; gap: 0; }
    .info-item { display: flex; align-items: center; gap: 14px; padding: 13px 0; border-bottom: 1px solid var(--border-color); }
    .info-item:last-child { border-bottom: none; padding-bottom: 0; }
    .info-icon { width: 38px; height: 38px; background: linear-gradient(135deg,rgba(255,107,0,0.15),rgba(255,149,0,0.08)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #FF6B00; font-size: 0.9rem; flex-shrink: 0; }
    .info-label { font-size: 10px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
    .info-value { font-size: 0.875rem; font-weight: 600; color: var(--text-primary); }
    .info-value a { color: var(--text-primary); text-decoration: none; transition: color 0.2s; }
    .info-value a:hover { color: #FF6B00; }

    /* ── WHAT I CAN HELP ── */
    .help-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .help-item { display: flex; align-items: center; gap: 8px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 10px; padding: 10px 12px; font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); transition: all 0.2s; }
    .help-item:hover { border-color: rgba(255,107,0,0.3); color: var(--text-primary); }
    .help-item i { color: #FF6B00; font-size: 0.8rem; width: 14px; text-align: center; }
    .help-title { font-size: 11px; font-weight: 800; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }

    /* ── FORMULARIO ── */
    .form-card { background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); padding: 36px; position: relative; overflow: hidden; }
    .form-card::before { content:''; position:absolute; top:-80px; right:-80px; width:240px; height:240px; background:radial-gradient(circle,rgba(255,107,0,0.06) 0%,transparent 70%); pointer-events:none; }
    .form-header { margin-bottom: 28px; }
    .form-header h2 { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.02em; margin-bottom: 6px; }
    .form-header p { color: var(--text-secondary); font-size: 0.875rem; line-height: 1.6; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media(max-width:480px){ .form-row { grid-template-columns:1fr; } }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.06em; }
    .form-group input,
    .form-group select,
    .form-group textarea { width: 100%; background: var(--bg-secondary); border: 1.5px solid var(--border-color); border-radius: var(--radius-md); padding: 13px 16px; font-size: 0.9375rem; color: var(--text-primary); font-family: inherit; transition: border-color 0.18s, box-shadow 0.18s, background 0.18s; outline: none; appearance: none; }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #FF6B00; box-shadow: 0 0 0 3px rgba(255,107,0,0.1); background: var(--bg-primary); }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--text-tertiary); }
    .form-group textarea { resize: vertical; min-height: 130px; }
    .select-wrapper { position: relative; }
    .select-wrapper::after { content:'\f078'; font-family:'Font Awesome 6 Free'; font-weight:900; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--text-tertiary); pointer-events:none; font-size:0.7rem; }

    /* ── SUBMIT BTN ── */
    .btn-submit { width: 100%; padding: 15px 24px; background: linear-gradient(135deg,#FF6B00,#FF9500); color: white; border: none; border-radius: var(--radius-full); font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.22s; box-shadow: 0 6px 20px rgba(255,107,0,0.35); letter-spacing: 0.01em; position: relative; overflow: hidden; }
    .btn-submit::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent); opacity:0; transition:opacity 0.18s; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,0,0.45); }
    .btn-submit:hover::before { opacity:1; }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
    .btn-spinner { width:18px; height:18px; border:2.5px solid rgba(255,255,255,0.35); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .btn-submit.loading .btn-spinner { display:block; }
    .btn-submit.loading .btn-text { display:none; }

    /* ── DISCLAIMER ── */
    .form-disclaimer { display: flex; align-items: center; gap: 8px; margin-top: 14px; color: var(--text-tertiary); font-size: 0.75rem; }
    .form-disclaimer i { color: #FF6B00; font-size: 0.8rem; flex-shrink: 0; }

    /* ── SUCCESS ── */
    .success-screen { display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding: 48px 28px; min-height: 400px; }
    .success-screen.visible { display:flex; }
    .success-icon-wrap { width:80px; height:80px; background:linear-gradient(135deg,#34C759,#30D158); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; color:white; margin-bottom:24px; box-shadow:0 8px 28px rgba(52,199,89,0.4); animation:successPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes successPop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
    .success-screen h3 { font-size:1.5rem; font-weight:800; color:var(--text-primary); margin-bottom:10px; letter-spacing:-0.02em; }
    .success-screen p { color:var(--text-secondary); font-size:0.9375rem; line-height:1.65; max-width:340px; margin:0 auto 24px; }
    .success-chips { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    .success-chip { display:flex; align-items:center; gap:6px; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:var(--radius-full); padding:7px 14px; font-size:0.78rem; color:var(--text-secondary); font-weight:600; }
    .success-chip i { color:#34C759; }
  </style>
</head>

      const lname   = document.getElementById('lname').value.trim();
      const email   = document.getElementById('email').value.trim();
      const reason  = document.getElementById('reason').value;
      const message = document.getElementById('message').value.trim();

      let valid = true;
      [['fname',fname],['email',email],['message',message]].forEach(([id,val]) => {
        const el = document.getElementById(id);
        if (!val) { el.style.borderColor='#FF3B30'; el.addEventListener('input',()=>el.style.borderColor='',{once:true}); valid=false; }
      });
      if (!reason) {
        const sel = document.getElementById('reason');
        sel.style.borderColor='#FF3B30'; sel.addEventListener('change',()=>sel.style.borderColor='',{once:true}); valid=false;
      }
      if (!valid) return;
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        const el = document.getElementById('email'); el.style.borderColor='#FF3B30'; el.focus(); return;
      }

      submitBtn.classList.add('loading'); submitBtn.disabled = true;

      const d = t[lang];
      const reasonLabel = (d.reasons.find(r => r.value === reason) || {}).label || reason;
      const cleanReason = reasonLabel.replace(/^[\u{1F000}-\u{1FFFF}\u2600-\u27FF]\s*/u, '').trim();

      try {
        await fetch(MAKE_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre:  `${fname} ${lname}`.trim(),
            email,
            motivo:  cleanReason,
            mensaje: message,
            fecha:   new Date().toLocaleString('es-AR', { timeZone: 'America/New_York' })
          }),
          mode: 'no-cors'
        });

        formWrapper.style.opacity   = '0';
        formWrapper.style.transform = 'translateY(-10px)';
        formWrapper.style.transition = 'all 0.3s ease';
        setTimeout(() => {
          formWrapper.style.display = 'none';
          successScreen.classList.add('visible');
        }, 300);

      } catch(err) {
        submitBtn.classList.remove('loading'); submitBtn.disabled = false;
        alert('Problema de conexión. Escribime directo a jaime.pivet@gmail.com');
      }
    });
  }

  function toggleLang() {
    lang = lang === 'es' ? 'en' : 'es';
    localStorage.setItem('homeLang', lang);
    render();
  }

  document.addEventListener('DOMContentLoaded', () => {
    render();
    document.getElementById('languageToggle').addEventListener('click', toggleLang);
  });
  </script>
</body>
</html>
