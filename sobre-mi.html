    .about-hero-content p { font-size:0.9375rem; color:var(--text-secondary); line-height:1.75; margin-bottom:14px; }
    .about-hero-content p strong { color:var(--text-primary); }
    .about-badges { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .about-badge { display:flex; align-items:center; gap:6px; background:var(--bg-secondary); border:1px solid var(--border-color); padding:6px 12px; border-radius:20px; font-size:12px; font-weight:600; color:var(--text-secondary); }

    @media(max-width:900px){ .about-hero { grid-template-columns:1fr; } .about-hero-img { min-height:280px; } .about-hero-content { padding:28px; } .about-hero-img-overlay { background:linear-gradient(to top, var(--glass-bg) 0%, transparent 50%); } }

    /* ── PULLQUOTE ── */
    .pullquote { background:linear-gradient(135deg,rgba(255,107,0,0.06),rgba(255,149,0,0.03)); border-left:4px solid #FF6B00; border-radius:0 12px 12px 0; padding:24px 28px; margin:32px 0; }
    .pullquote p { font-size:1.1rem; font-style:italic; color:var(--text-primary); line-height:1.7; margin:0; }
    .pullquote cite { display:block; font-size:0.8rem; color:var(--text-tertiary); margin-top:10px; font-style:normal; font-weight:600; }

    /* ── SECTION HEADERS ── */
    .section-eyebrow { font-size:11px; font-weight:800; color:#FF6B00; text-transform:uppercase; letter-spacing:0.12em; margin-bottom:8px; }
    .section-title { font-size:1.6rem; font-weight:700; color:var(--text-primary); letter-spacing:-0.02em; margin-bottom:28px; }

    /* ── TIMELINE ── */
    .timeline { position:relative; padding-left:32px; }
    .timeline::before { content:''; position:absolute; left:10px; top:8px; bottom:8px; width:2px; background:linear-gradient(to bottom, #FF6B00, rgba(255,107,0,0.1)); border-radius:2px; }
    .timeline-item { position:relative; margin-bottom:32px; }
    .timeline-item:last-child { margin-bottom:0; }
    .timeline-dot { position:absolute; left:-26px; top:4px; width:14px; height:14px; background:#FF6B00; border-radius:50%; border:2px solid var(--bg-primary); box-shadow:0 0 0 3px rgba(255,107,0,0.2); }
    .timeline-card { background:var(--glass-bg); border:1px solid var(--border-color); border-radius:14px; padding:20px 22px; transition:all 0.2s; }
    .timeline-card:hover { border-color:rgba(255,107,0,0.3); transform:translateX(4px); }
    .timeline-header { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
    .timeline-title { font-size:0.9375rem; font-weight:700; color:var(--text-primary); }
    .timeline-company { font-size:0.8125rem; font-weight:600; color:#FF6B00; margin-bottom:4px; }
    .timeline-date { font-size:11px; font-weight:700; color:var(--text-tertiary); background:var(--bg-secondary); padding:3px 10px; border-radius:10px; white-space:nowrap; }
    .timeline-desc { font-size:0.8125rem; color:var(--text-secondary); line-height:1.65; }
    .timeline-highlights { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .timeline-highlight { font-size:10px; font-weight:700; color:#34C759; background:rgba(52,199,89,0.1); padding:3px 9px; border-radius:8px; }
    .timeline-origin { font-size:10px; font-weight:700; color:#FF6B00; background:rgba(255,107,0,0.1); padding:3px 9px; border-radius:8px; }

    /* ── VALUE CARDS — rediseño horizontal con número ── */
    .values-section { margin:48px 0; }
    .values-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
    .value-card {
      background:var(--glass-bg);
      border:1px solid var(--border-color);
      border-radius:16px;
      padding:28px 24px;
      display:flex;
      flex-direction:column;
      gap:14px;
      transition:all 0.25s;
      position:relative;
      overflow:hidden;
    }
    .value-card::before {
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,rgba(255,107,0,0.04),transparent);
      opacity:0;
      transition:opacity 0.25s;
    }
    .value-card:hover { border-color:rgba(255,107,0,0.35); transform:translateY(-4px); box-shadow:0 14px 36px rgba(255,107,0,0.1); }
    .value-card:hover::before { opacity:1; }
    .value-card-top { display:flex; align-items:center; gap:14px; }
    .value-icon {

      background:linear-gradient(135deg,rgba(255,107,0,0.15),rgba(255,149,0,0.08));
      border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.25rem; color:#FF6B00;
      flex-shrink:0;
    }
    .value-number {
      font-size:2.2rem;
      font-weight:800;
      color:rgba(255,107,0,0.12);
      line-height:1;
      letter-spacing:-2px;
      margin-left:auto;
    }
    .value-title { font-size:0.9375rem; font-weight:700; color:var(--text-primary); line-height:1.3; }
    .value-guarantee {
      font-size:11px;
      font-weight:700;
      color:#FF6B00;
      text-transform:uppercase;
      letter-spacing:0.08em;
      background:rgba(255,107,0,0.08);
      padding:3px 10px;
      border-radius:10px;
      width:fit-content;
    }
    .value-desc { font-size:0.8125rem; color:var(--text-secondary); line-height:1.65; }

    /* ── PERSONAL CARDS — rediseño con más presencia visual ── */
    .personal-section { margin:48px 0; }
    .personal-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
    .personal-card {
      background:var(--glass-bg);
      border:1px solid var(--border-color);
      border-radius:16px;
      padding:28px 22px;
      display:flex;
      flex-direction:column;
      gap:12px;

      position:relative;
      overflow:hidden;

    .personal-card::after {
      content:'';
      position:absolute;
      bottom:0; left:0; right:0;
      height:2px;
      background:linear-gradient(90deg,#FF6B00,#FF9500);

      transform-origin:left;

    .personal-icon-wrap {
      width:48px; height:48px;
      background:linear-gradient(135deg,#FF6B00,#FF9500);
      border-radius:13px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; color:white;
      box-shadow:0 6px 18px rgba(255,107,0,0.3);
    }
    .personal-title { font-size:1rem; font-weight:700; color:var(--text-primary); line-height:1.25; }
    .personal-desc { font-size:0.8125rem; color:var(--text-secondary); line-height:1.6; }

    /* ── CTA ── */
    .about-cta { margin:48px 0; background:linear-gradient(135deg,rgba(255,107,0,0.08),rgba(255,149,0,0.04)); border:1px solid rgba(255,107,0,0.2); border-radius:20px; padding:40px; text-align:center; }
    .about-cta h2 { font-size:1.5rem; font-weight:800; color:var(--text-primary); margin-bottom:10px; letter-spacing:-0.02em; }
    .about-cta p { color:var(--text-secondary); margin-bottom:24px; line-height:1.6; }
    .btn-outline { display:inline-flex; align-items:center; gap:8px; padding:12px 24px; border:2px solid var(--border-color); border-radius:50px; color:var(--text-primary); font-weight:600; font-size:14px; text-decoration:none; transition:all 0.2s; background:transparent; }
    .btn-outline:hover { border-color:#FF6B00; color:#FF6B00; }
  </style>
</head>
