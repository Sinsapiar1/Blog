  let lang = localStorage.getItem('aboutLang') || localStorage.getItem('homeLang') || 'es';

  function render() {
    const d = t[lang];
    document.title = d.page_title;
    document.getElementById('sidebarSubtitle').textContent = d.sidebar;
    document.getElementById('footerText').textContent = d.footer;
    document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (d[k]) el.textContent = d[k]; });
    document.getElementById('languageFlag').textContent = lang === 'es' ? '🇺🇸' : '🇪🇸';
    document.getElementById('languageText').textContent = lang === 'es' ? 'English' : 'Español';
    document.getElementById('mainContent').innerHTML = `
      <section class="about-hero" data-aos="fade-up">
        <div class="about-hero-img"><img src="img/gallery/filo.png" alt="Raul Pivet" loading="lazy"><div class="about-hero-img-overlay"></div></div>
        <div class="about-hero-content">
          <div class="about-eyebrow"><i class="fas fa-user"></i> ${d.eyebrow}</div>
          <h1>${d.h1}<br><span>${d.h1span}</span></h1>
          <p class="about-role">${d.role}</p>
          <p>${d.p1}</p><p>${d.p2}</p><p>${d.p3}</p>
          <div class="about-badges">${d.badges.map(b=>`<span class="about-badge"><i class="${b.icon}"></i>${b.text}</span>`).join('')}</div>
        </div>
      </section>
      <div class="pullquote" data-aos="fade-up"><p>"${d.quote}"</p><cite>${d.quote_cite}</cite></div>
      <section data-aos="fade-up">
        <p class="section-eyebrow">${d.timeline_eyebrow}</p>
        <h2 class="section-title">${d.timeline_title}</h2>
        <div class="timeline">${d.timeline.map((item,i)=>`
          <div class="timeline-item" data-aos="fade-up" data-aos-delay="${i*50}">
            <div class="timeline-dot"></div>
            <div class="timeline-card">
              <div class="timeline-header">
                <div>
                  <div class="timeline-title">${item.title}</div>
                  <div class="timeline-company">${item.company}</div>
                </div>
                <span class="timeline-date">${item.date}</span>
              </div>
              <p class="timeline-desc">${item.desc}</p>
              <div class="timeline-highlights">
                ${item.highlights.map(h=>`<span class="timeline-highlight">✓ ${h}</span>`).join('')}
                ${item.origin ? `<span class="timeline-origin">${item.origin}</span>` : ''}
              </div>
            </div>
          </div>`).join('')}
        </div>
      </section>
      <section class="values-section" data-aos="fade-up">
        <p class="section-eyebrow">${d.values_eyebrow}</p>
        <h2 class="section-title">${d.values_title}</h2>
        <div class="values-grid">${d.values.map((v,i)=>`<div class="value-card" data-aos="fade-up" data-aos-delay="${i*50}"><div class="value-icon"><i class="${v.icon}"></i></div><h3 class="value-title">${v.title}</h3><p class="value-desc">${v.desc}</p></div>`).join('')}</div>
      </section>
      <section class="personal-section" data-aos="fade-up">
        <p class="section-eyebrow">${d.personal_eyebrow}</p>
        <h2 class="section-title">${d.personal_title}</h2>
        <div class="personal-grid">${d.personal.map((p,i)=>`<div class="personal-card" data-aos="fade-up" data-aos-delay="${i*50}"><div class="personal-icon"><i class="${p.icon}"></i></div><div><div class="personal-title">${p.title}</div><p class="personal-desc">${p.desc}</p></div></div>`).join('')}</div>
      </section>
      <section class="about-cta" data-aos="fade-up">
        <h2>${d.cta_title}</h2><p>${d.cta_desc}</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <a href="contacto.html" class="btn"><i class="fas fa-paper-plane"></i> ${d.cta_btn1}</a>
          <a href="cv.html" class="btn-outline"><i class="fas fa-file-alt"></i> ${d.cta_btn2}</a>
        </div>
      </section>`;
    if (typeof AOS !== 'undefined') { AOS.init({ once:true, duration:600 }); AOS.refresh(); }
  }

  function toggleLang() { lang = lang === 'es' ? 'en' : 'es'; localStorage.setItem('aboutLang', lang); localStorage.setItem('homeLang', lang); render(); }
  document.addEventListener('DOMContentLoaded', () => { render(); document.getElementById('languageToggle').addEventListener('click', toggleLang); });
  </script>
</body>
</html>
