<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FF9500"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.22)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Fondo con esquinas redondeadas estilo iOS -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Brillo superior sutil -->
  <rect width="100" height="50" rx="22" ry="22" fill="url(#shine)"/>

  <!-- Letra R -->
  <text
    x="14" y="72"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="62"
    font-weight="800"
    fill="white"
    letter-spacing="-4"
    style="font-style:normal;">R</text>

  <!-- Letra P — ligeramente desplazada para efecto layered -->
  <text
    x="49" y="72"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="62"
    font-weight="800"
    fill="rgba(255,255,255,0.88)"
    style="font-style:normal;">P</text>

  <!-- Línea inferior decorativa -->
  <rect x="14" y="80" width="72" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
</svg>
