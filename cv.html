  <link rel="alternate icon" type="image/png" href="favicon-32x32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Language toggle ── */
    .language-toggle { position:fixed; top:80px; right:24px; z-index:999; display:flex; align-items:center; gap:8px; background:var(--glass-bg); backdrop-filter:blur(20px) saturate(180%); border:1px solid var(--glass-border); padding:8px 16px; border-radius:var(--radius-full); box-shadow:var(--shadow-sm); cursor:pointer; transition:all var(--transition-base); }
    .language-toggle:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
    .language-flag { font-size:1.25rem; }
    .language-text { font-size:0.875rem; font-weight:500; color:var(--text-primary); }
    @media(max-width:768px){ .language-toggle { top:70px; right:16px; padding:6px 12px; } .language-text { display:none; } }

    /* ══════════════════════════════════════════
       CV HEADER — cinematic, full-bleed
    ══════════════════════════════════════════ */
    .cv-header {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 28px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
    }
    /* Fondo decorativo — malla + gradientes */
    .cv-header-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(135deg, rgba(255,107,0,0.12) 0%, transparent 50%),
        linear-gradient(315deg, rgba(255,149,0,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .cv-header-bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,107,0,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,107,0,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    /* Borde superior naranja */
    .cv-header::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, #FF6B00, #FF9500, #FFB800, #FF9500, #FF6B00);
      background-size: 200% 100%;
      animation: header-stripe 4s linear infinite;
    }
    @keyframes header-stripe {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }
    .cv-header-inner {
      position: relative; z-index: 1;
      padding: 52px 40px 44px;
      display: flex;
      align-items: center;
      gap: 36px;
    }
    @media(max-width:700px){ .cv-header-inner { flex-direction:column; text-align:center; padding:40px 24px 32px; gap:20px; } }

    .cv-header-avatar {
      width: 96px; height: 96px; flex-shrink: 0;
      border-radius: 50%;
      background: linear-gradient(135deg,#FF6B00,#FF9500);
      padding: 3px;
      box-shadow: 0 8px 32px rgba(255,107,0,0.4);
    }
    .cv-header-avatar img {
      width: 100%; height: 100%;
      border-radius: 50%; object-fit: cover;
      display: block;
    }
    .cv-header-text { flex: 1; }
    .cv-header-name {
      font-size: clamp(2rem,4vw,2.8rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 8px;
      background: linear-gradient(135deg,#FF6B00,#FF9500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .cv-header-title {
      font-size: 1rem; font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .cv-contact {
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    @media(max-width:700px){ .cv-contact { justify-content:center; } }
    .cv-contact-item {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s;
    }
    .cv-contact-item:hover { border-color:#FF6B00; color:#FF6B00; }
    .cv-contact-item i { color:#FF6B00; font-size:0.75rem; }

    /* ══════════════════════════════════════════
       CV SECTION — card elevada con línea top
    ══════════════════════════════════════════ */
    .cv-section {
      background: var(--glass-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 36px 36px 32px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .cv-section:hover { border-color: rgba(255,107,0,0.2); }
    .cv-section-title {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px;
    }
    .cv-section-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      background: linear-gradient(135deg,rgba(255,107,0,0.18),rgba(255,149,0,0.08));
      border: 1px solid rgba(255,107,0,0.2);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: #FF6B00; font-size: 1rem;
    }
    .cv-section-label {
      font-size: 1.25rem; font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .cv-section-divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(255,107,0,0.3), transparent);
      margin-bottom: 28px;
      margin-top: -12px;
    }

    /* ══════════════════════════════════════════
       TIMELINE — experiencia laboral
    ══════════════════════════════════════════ */
    .cv-timeline { position: relative; padding-left: 28px; }
    .cv-timeline::before {
      content: '';
      position: absolute; left: 7px; top: 6px; bottom: 6px; width: 2px;
      background: linear-gradient(to bottom, #FF6B00, rgba(255,107,0,0.08));
      border-radius: 2px;
    }
    .cv-tl-item {
      position: relative;
      margin-bottom: 28px;
      transition: all 0.2s;
    }
    .cv-tl-item:last-child { margin-bottom: 0; }
    .cv-tl-dot {
      position: absolute; left: -24px; top: 14px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--bg-primary);
      border: 2.5px solid #FF6B00;
      box-shadow: 0 0 0 3px rgba(255,107,0,0.15);
      transition: all 0.2s;
    }
    .cv-tl-item:hover .cv-tl-dot {
      background: #FF6B00;
      box-shadow: 0 0 0 5px rgba(255,107,0,0.2);
    }
    .cv-tl-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px 22px 18px;
      transition: all 0.25s;
    }
    .cv-tl-item:hover .cv-tl-card {
      border-color: rgba(255,107,0,0.3);
      transform: translateX(4px);
      box-shadow: 0 8px 28px rgba(255,107,0,0.08);
    }
    .cv-tl-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .cv-tl-title {
      font-size: 0.9375rem; font-weight: 800;
      color: var(--text-primary); line-height: 1.3;
    }
    .cv-tl-company {
      font-size: 0.8125rem; font-weight: 600;
      color: #FF6B00; margin-top: 3px;
    }
    .cv-tl-date {
      font-size: 11px; font-weight: 700;
      color: var(--text-tertiary);
      background: var(--glass-bg);
      border: 1px solid var(--border-color);
      padding: 3px 10px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
    }
    .cv-tl-bullets {
      margin: 0; padding: 0; list-style: none;
      display: flex; flex-direction: column; gap: 6px;
    }
    .cv-tl-bullets li {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.6;
      padding-left: 16px;
      position: relative;
    }
    .cv-tl-bullets li::before {
      content: '›';
      position: absolute; left: 0;
      color: #FF6B00; font-weight: 700; font-size: 1rem; line-height: 1.4;
    }
    .origin-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.3);
      color: #FF6B00; font-size: 9px; font-weight: 800;
      padding: 2px 8px; border-radius: 10px;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-left: 8px; vertical-align: middle;
    }

    /* ══════════════════════════════════════════
       PROFILE SUMMARY
    ══════════════════════════════════════════ */
    .profile-summary {
      background: linear-gradient(135deg,rgba(255,107,0,0.06),rgba(255,149,0,0.03));
      border-left: 3px solid #FF6B00;
      border-radius: 0 14px 14px 0;
      padding: 20px 24px;
      font-size: 0.9375rem;
      color: var(--text-secondary);
      line-height: 1.78;
    }
    .highlight {
      background: rgba(255,107,0,0.12);
      padding: 1px 7px; border-radius: 4px;
      font-weight: 600; color: var(--text-primary);
    }

    /* ══════════════════════════════════════════
       EDUCATION / CERTIFICATIONS
    ══════════════════════════════════════════ */
    .cv-edu-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 14px;
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 12px; flex-wrap: wrap;
      transition: all 0.2s;
    }
    .cv-edu-item:hover { border-color:rgba(255,107,0,0.3); transform:translateX(4px); }
    .cv-edu-item:last-child { margin-bottom: 0; }
    .cv-edu-title { font-size:0.9rem; font-weight:700; color:var(--text-primary); margin-bottom:3px; }
    .cv-edu-inst { font-size:0.8rem; color:#FF6B00; font-weight:600; }
    .cv-edu-date { font-size:11px; font-weight:700; color:var(--text-tertiary); background:var(--glass-bg); border:1px solid var(--border-color); padding:3px 10px; border-radius:10px; white-space:nowrap; flex-shrink:0; margin-top:2px; }
    .cert-list { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
    .cert-item {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .cert-item:hover { border-color:rgba(255,107,0,0.25); }
    .cert-item i { color:#FF6B00; margin-top:2px; flex-shrink:0; font-size:0.75rem; }

    /* ══════════════════════════════════════════
       SKILLS GRID — 3D hover + glow
    ══════════════════════════════════════════ */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
    }
    .skill-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 18px 10px 14px;
      text-align: center;
      cursor: default;
      transition: all 0.25s cubic-bezier(0.34,1.3,0.64,1);
      position: relative; overflow: hidden;
    }
    .skill-item::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg,rgba(255,107,0,0.06),transparent);
      opacity: 0; transition: opacity 0.25s;
    }
    .skill-item:hover {
      border-color: rgba(255,107,0,0.45);
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 12px 32px rgba(255,107,0,0.18);
    }
    .skill-item:hover::before { opacity: 1; }
    .skill-icon {
      font-size: 1.8rem; color: #FF6B00;
      margin-bottom: 10px;
      display: block;
      transition: transform 0.25s;
    }
    .skill-item:hover .skill-icon { transform: scale(1.15) rotate(-3deg); }
    .skill-name {
      font-size: 0.75rem; font-weight: 700;
      color: var(--text-secondary);
      line-height: 1.3;
      transition: color 0.2s;
    }
    .skill-item:hover .skill-name { color: var(--text-primary); }

    /* ══════════════════════════════════════════
       IDIOMAS — barras de progreso + pills
    ══════════════════════════════════════════ */
    .lang-list { display: flex; flex-direction: column; gap: 16px; }
    .lang-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 16px 20px;
      transition: all 0.2s;
    }
    .lang-item:hover { border-color:rgba(255,107,0,0.3); }
    .lang-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .lang-name { font-size:0.9375rem; font-weight:800; color:var(--text-primary); }
    .lang-pill {
      font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.1em;
      padding:3px 10px; border-radius:10px;
      background:rgba(255,107,0,0.1); border:1px solid rgba(255,107,0,0.25);
      color:#FF6B00;
    }
    .lang-pill.native {
      background:rgba(52,199,89,0.1); border-color:rgba(52,199,89,0.25); color:#34C759;
    }
    .lang-bar-track {
      height: 5px; background: var(--border-color);
      border-radius: 10px; overflow: hidden;
    }
    .lang-bar-fill {
      height: 100%; border-radius: 10px;
      background: linear-gradient(90deg,#FF6B00,#FF9500);
      transition: width 1s cubic-bezier(0.25,1,0.5,1);
    }
    .lang-bar-fill.native-bar { background: linear-gradient(90deg,#34C759,#30D158); }
    .lang-sublabel {
      font-size:10px; color:var(--text-tertiary); margin-top:6px; font-style:italic;
    }

    /* Download modal */
    #dlModal { display:none; position:fixed; inset:0; z-index:6000; align-items:center; justify-content:center; }
    #dlModal.open { display:flex; }
    .dl-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.65); backdrop-filter:blur(10px); cursor:pointer; }
    .dl-box { position:relative; z-index:1; background:var(--glass-bg); backdrop-filter:blur(24px) saturate(180%); border:1px solid var(--glass-border); border-radius:var(--radius-xl); padding:36px 40px 40px; width:min(92vw,460px); box-shadow:0 32px 80px rgba(0,0,0,0.4); text-align:center; animation:dlPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes dlPop { from{opacity:0;transform:scale(0.88) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .dl-close { position:absolute; top:14px; right:14px; width:32px; height:32px; border:none; border-radius:50%; background:var(--bg-secondary); color:var(--text-secondary); cursor:pointer; font-size:0.9rem; display:flex; align-items:center; justify-content:center; transition:all var(--transition-fast); }
    .dl-close:hover { background:rgba(255,59,48,0.15); color:#FF3B30; transform:scale(1.1); }
    .dl-icon { width:64px; height:64px; background:linear-gradient(135deg,#FF6B00,#FF9500); border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:1.6rem; color:white; margin:0 auto 20px; box-shadow:0 8px 24px rgba(255,107,0,0.35); }
    .dl-title { font-size:1.35rem; font-weight:700; color:var(--text-primary); margin-bottom:6px; letter-spacing:-0.02em; }
    .dl-subtitle { font-size:0.875rem; color:var(--text-secondary); margin-bottom:28px; line-height:1.5; }
    .dl-options { display:flex; flex-direction:column; gap:12px; }
    .dl-btn { display:flex; align-items:center; gap:16px; padding:16px 20px; border-radius:var(--radius-lg); border:1.5px solid var(--border-color); background:var(--bg-secondary); cursor:pointer; text-decoration:none; transition:all var(--transition-base); text-align:left; }
    .dl-btn:hover { border-color:#FF6B00; background:rgba(255,107,0,0.06); transform:translateY(-2px); box-shadow:var(--shadow-md); }
    .dl-btn-flag { font-size:2rem; flex-shrink:0; line-height:1; }
    .dl-btn-info { flex:1; }
    .dl-btn-lang { font-size:1rem; font-weight:700; color:var(--text-primary); display:block; margin-bottom:2px; }
    .dl-btn-desc { font-size:0.78rem; color:var(--text-secondary); }
    .dl-btn-arrow { color:var(--text-tertiary); font-size:0.85rem; transition:all var(--transition-fast); }
    .dl-btn:hover .dl-btn-arrow { color:#FF6B00; transform:translateX(3px); }
    .dl-btn.primary-lang { border-color:#FF6B00; background:rgba(255,107,0,0.05); }
    .dl-btn.primary-lang .dl-btn-lang { color:#FF6B00; }
    .dl-divider { display:flex; align-items:center; gap:10px; color:var(--text-tertiary); font-size:0.78rem; margin:2px 0; }
    .dl-divider::before,.dl-divider::after { content:''; flex:1; height:1px; background:var(--border-color); }

    @media(max-width:600px){ .skills-grid { grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); } .cv-section { padding:24px 20px 20px; } }
  </style>
</head>

  <script>
  const translations = {
    en: {
      subtitle: "Logistics Operations Specialist & Business Solutions Developer",
      profileTitle: "Professional Profile",
      profileText: "<strong>10+ years</strong> transforming manual logistics operations into automated, data-driven solutions. Specialist in <span class='highlight'>Microsoft Power Platform</span>, <span class='highlight'>Python development</span> and <span class='highlight'>web application development</span>, creating tools that reduce operational costs, improve team efficiency and build scalable digital products. Started from the ground up — warehouse helper, warehouse manager, logistics coordinator — building deep technical expertise alongside real operational experience across Chile and the United States.",

      jobs: [
