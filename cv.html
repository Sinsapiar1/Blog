        dlSecondaryFlag: "🇺🇸", dlSecondaryLang: "English", dlSecondaryDesc: "CV_Raul_Pivet_EN.pdf", dlSecondaryFile: "docs/CV_Raul_Pivet_EN.pdf"
      }
    };

    let currentLang = localStorage.getItem('cvLanguage') || localStorage.getItem('homeLang') || 'es';

    function renderCV(lang) {
      const t = translations[lang];
      const jobsHTML = t.jobs.map(job => `
        <div class="cv-item">
          <div class="cv-item-header">
            <div>
              <h3 class="cv-item-title">${job.title}${job.originBadge ? ` <span class="origin-badge"><i class="fas fa-seedling"></i> ${job.originBadge}</span>` : ''}</h3>
              <p class="cv-item-company">${job.company}</p>
            </div>
            <span class="cv-item-date">${job.date}</span>
          </div>
          <div class="cv-item-description"><ul>${job.bullets.map(b => `<li>${b}</li>`).join('')}</ul></div>
        </div>`).join('');

      const educationHTML = t.education.map(ed => `
        <div class="cv-item">
          <div class="cv-item-header">
            <div><h3 class="cv-item-title">${ed.title}</h3><p class="cv-item-company">${ed.company}</p></div>
            <span class="cv-item-date">${ed.date}</span>
          </div>
        </div>`).join('');

      document.getElementById('cvContent').innerHTML = `
        <div class="cv-header" data-aos="fade-down">
          <h1>Raul Pivet</h1>
          <p class="subtitle">${t.subtitle}</p>
          <div class="cv-contact">
            <div class="cv-contact-item"><i class="fas fa-envelope"></i><span>jaime.pivet@gmail.com</span></div>
            <div class="cv-contact-item"><i class="fas fa-phone"></i><span>+1 (305) 504-6846</span></div>
            <div class="cv-contact-item"><i class="fas fa-map-marker-alt"></i><span>Cutler Bay, FL 33189</span></div>
            <div class="cv-contact-item"><i class="fab fa-linkedin"></i><a href="https://linkedin.com/in/raulpivet" target="_blank" style="color:inherit;text-decoration:none">linkedin.com/in/raulpivet</a></div>
          </div>
        </div>
        <section class="cv-section" data-aos="fade-up">
          <h2><i class="fas fa-user-tie"></i> ${t.profileTitle}</h2>
          <div class="profile-summary"><p class="cv-item-description">${t.profileText}</p></div>
        </section>
        <section class="cv-section" data-aos="fade-up">
          <h2><i class="fas fa-briefcase"></i> ${t.experienceTitle}</h2>
          ${jobsHTML}
        </section>
        <section class="cv-section" data-aos="fade-up">
          <h2><i class="fas fa-graduation-cap"></i> ${t.educationTitle}</h2>
          ${educationHTML}
          <div class="cv-item">
            <h3 class="cv-item-title" style="margin-bottom:var(--spacing-sm)">${t.certificationsTitle}</h3>
            <div class="cv-item-description"><ul>${t.certifications.map(c => `<li>${c}</li>`).join('')}</ul></div>
          </div>
        </section>
        <section class="cv-section" data-aos="fade-up">
          <h2><i class="fas fa-code"></i> ${t.skillsTitle}</h2>
          <div class="skills-grid">
            ${[['chart-bar','Power BI'],['cogs','Power Automate'],['database','Dataverse'],['python fab','Python'],['table','Pandas/NumPy'],['chart-line','Streamlit'],['js fab','JavaScript'],['html5 fab','HTML/CSS'],['google fab','Google Suite'],['fire','AppSheet'],['git-alt fab','Git/GitHub'],['file-excel','Excel Advanced'],['warehouse','ERP/WMS'],['robot','Gemini AI'],['bolt','Make.com'],['server','SAP ERP'],['mobile-alt','Power Apps'],['project-diagram','Power Platform']].map(([ic,nm]) => `
            <div class="skill-item">
              <div class="skill-icon"><i class="${ic.includes('fab') ? 'fab' : 'fas'} fa-${ic.replace(' fab','')}"></i></div>
              <div class="skill-name">${nm}</div>
            </div>`).join('')}
          </div>
        </section>
        <section class="cv-section" data-aos="fade-up">
          <h2><i class="fas fa-language"></i> ${t.languagesTitle}</h2>
          <div class="language-item"><span class="language-name">${t.lang1}</span><span class="language-level">${t.lang1Level}</span></div>
          <div class="language-item"><span class="language-name">${t.lang2}</span><span class="language-level">${t.lang2Level}</span></div>
        </section>
        <div class="download-cv" data-aos="fade-up">
          <button class="btn" id="openDlModal"><i class="fas fa-download"></i> ${t.downloadBtn}</button>
        </div>`;

      document.getElementById('openDlModal').addEventListener('click', openDownloadModal);
      if (typeof AOS !== 'undefined') AOS.refresh();
      const footer = document.querySelector('footer span[data-lang="footer"]');
      if (footer) footer.textContent = t.footer;
    }

    function openDownloadModal() {
      const t = translations[currentLang];
      document.getElementById('dlTitle').textContent = t.dlTitle;
      document.getElementById('dlSubtitle').textContent = t.dlSubtitle;
      document.getElementById('dlOptions').innerHTML = `
        <a href="${t.dlPrimaryFile}" download class="dl-btn primary-lang">
          <span class="dl-btn-flag">${t.dlPrimaryFlag}</span>
          <span class="dl-btn-info"><span class="dl-btn-lang">${t.dlPrimaryLang}</span><span class="dl-btn-desc">${t.dlPrimaryDesc}</span></span>
          <i class="fas fa-arrow-down dl-btn-arrow"></i>
        </a>
        <div class="dl-divider">${t.dlDivider}</div>
        <a href="${t.dlSecondaryFile}" download class="dl-btn">
          <span class="dl-btn-flag">${t.dlSecondaryFlag}</span>
          <span class="dl-btn-info"><span class="dl-btn-lang">${t.dlSecondaryLang}</span><span class="dl-btn-desc">${t.dlSecondaryDesc}</span></span>
          <i class="fas fa-arrow-down dl-btn-arrow"></i>
        </a>`;
      document.getElementById('dlModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDownloadModal() { document.getElementById('dlModal').classList.remove('open'); document.body.style.overflow = ''; }
    document.getElementById('dlClose').addEventListener('click', closeDownloadModal);
    document.getElementById('dlOverlay').addEventListener('click', closeDownloadModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDownloadModal(); });

    function toggleLanguage() {
      currentLang = currentLang === 'en' ? 'es' : 'en';
      localStorage.setItem('cvLanguage', currentLang);
      localStorage.setItem('homeLang', currentLang);
      document.getElementById('languageFlag').textContent = currentLang === 'en' ? '🇺🇸' : '🇪🇸';
      document.getElementById('languageText').textContent = currentLang === 'en' ? 'English' : 'Español';
      renderCV(currentLang);
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderCV(currentLang);
      document.getElementById('languageFlag').textContent = currentLang === 'en' ? '🇺🇸' : '🇪🇸';
      document.getElementById('languageText').textContent = currentLang === 'en' ? 'English' : 'Español';
      document.getElementById('languageToggle').addEventListener('click', toggleLanguage);
    });
  </script>
</body>
</html>
